name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cloudscale-app

# ──────────────────────────────────────────────
# Job 1: Build the Docker image and smoke-test /health
# Runs on every push to every branch.
# ──────────────────────────────────────────────
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Smoke-test /health endpoint
        run: |
          docker run -d --name test-app -p 3000:3000 ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # wait for the app to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/health; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 2
          done
          curl -sf http://localhost:3000/health || (echo "Health check failed" && exit 1)
          docker stop test-app

# ──────────────────────────────────────────────
# Job 2: Push image to ACR (main branch only)
# ──────────────────────────────────────────────
  push-to-acr:
    name: Push to ACR
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          ACR_NAME=$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d. -f1)
          az acr login --name "$ACR_NAME"

      - name: Build and push to ACR
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

# ──────────────────────────────────────────────
# Job 3: Deploy to AKS
# Gated by the "production" GitHub Environment —
# configure required reviewers in:
#   GitHub → Settings → Environments → production → Required reviewers
# ──────────────────────────────────────────────
  deploy-to-aks:
    name: Deploy to AKS
    needs: push-to-acr
    runs-on: ubuntu-latest
    environment: production   # <-- triggers the manual approval gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure kubectl
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Inject image reference into deployment manifest
        run: |
          sed -i "s|REGISTRY/cloudscale-app:TAG|${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: kubectl rollout status deployment/cloudscale-app --timeout=120s
